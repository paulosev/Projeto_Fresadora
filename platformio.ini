; =============================================================================
; PLATFORMIO - Projeto Fresadora STM32F103
; =============================================================================
;
; INSTALAÇÃO DO PLATFORMIO:
;   1. Instalar VS Code
;   2. Extensão PlatformIO IDE (ícone de formiga na barra lateral)
;   3. Abrir esta pasta: File → Open Folder → Projeto_Fresadora_PIO/
;   4. PlatformIO instala toolchain e bibliotecas automaticamente
;
; UPLOAD:
;   Via ST-Link:  conectar pinos SWDIO, SWCLK, GND, 3.3V
;   Via Serial:   BOOT0 = 1, reset, depois upload_protocol = serial
; =============================================================================

[env:bluepill_f103c8]
platform  = ststm32
board     = bluepill_f103c8
framework = arduino



; Clock máximo do STM32F103C8T6
board_build.f_cpu = 72000000L

; Upload via ST-Link V2 (recomendado)
upload_protocol = stlink

; Monitor Serial
monitor_speed = 115200


; Bibliotecas externas (PlatformIO baixa automaticamente)
lib_deps =
    dlloydev/QuickPID @ ^3.1.9
    dlloydev/sTune    @ ^2.3.0

; Expõe cada subpasta de lib/ como diretório de include.
; Com isso #include "maquina.h" funciona de qualquer arquivo do projeto,
; sem precisar de caminhos relativos como "lib/app/maquina.h".
lib_extra_dirs =
    lib/hal
    lib/control
    lib/app

build_flags =
    -O2
    -Wall
